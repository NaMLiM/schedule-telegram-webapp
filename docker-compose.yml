services:
  # ── Express App ────────────────────────────────────────────────────
  app:
    image: ghcr.io/namlim/schedule-telegram-webapp:latest
    container_name: schedule-telegram-webapp
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - internal

  # ── Nginx Reverse Proxy ────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: schedule-telegram-nginx
    ports:
      - "127.0.0.1:9080:80"
      - "127.0.0.1:9443:443"
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/default.conf.template:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot
    environment:
      - DOMAIN=${DOMAIN:-schedule.local}
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal
    command: >
      sh -c "
        sed 's/__DOMAIN__/'\"$$DOMAIN\"'/g' /etc/nginx/default.conf.template > /etc/nginx/conf.d/default.conf &&
        nginx -g 'daemon off;'
      "

  # ── Certbot (Cloudflare DNS challenge, renews every 12h) ───────────
  certbot:
    image: certbot/dns-cloudflare
    container_name: schedule-telegram-certbot
    volumes:
      - ./nginx/cloudflare.ini:/cloudflare.ini:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    profiles:
      - certbot
    entrypoint: >
      sh -c "
        trap exit TERM;
        while true; do
          certbot renew --dns-cloudflare --dns-cloudflare-credentials /cloudflare.ini --quiet;
          sleep 43200 &
          wait $$!;
        done
      "

networks:
  internal:
    driver: bridge
