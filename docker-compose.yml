services:
  app:
    build: .
    container_name: schedule-telegram-webapp
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: schedule-telegram-nginx
    ports:
      - "${NGINX_PORT:-8080}:8080"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

networks:
  internal:
    driver: bridge
