# ── Host Nginx — stream proxy: passes TLS straight to docker containers ──
# No SSL termination here — docker nginx handles the certs.
# Install in /etc/nginx/nginx.conf (stream context) or a separate file in
# /etc/nginx/streams-enabled/ if your distro supports it.

stream {
    # Docker DNS resolver (needed if using variables in proxy_pass)
    resolver 127.0.0.1 valid=30s;

    # Route by SNI — no certs needed on the host
    map $ssl_preread_server_name $backend_tls {
        schedule.stationhotspot.net.id     127.0.0.1:9443;
        *.murnimakmurabadi.id              127.0.0.1:8443;
        murnimakmurabadi.id                127.0.0.1:8443;
    }

    server {
        listen 443;
        ssl_preread on;
        proxy_pass $backend_tls;
        proxy_connect_timeout 10s;
        proxy_timeout 30s;
    }
}

