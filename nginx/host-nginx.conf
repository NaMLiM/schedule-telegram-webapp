# ── Host Nginx — sits on 80/443, routes to docker apps by domain ────
# Install: sudo cp this file to /etc/nginx/sites-available/schedule-gateway
#          then symlink to sites-enabled and reload.

# ── HTTP → HTTPS redirect (or skip if Cloudflare handles SSL) ─────────
# If Cloudflare proxy is ON (orange cloud), they terminate SSL for you.
# In that case you can set Cloudflare to Flexible mode and serve HTTP below.
# If Cloudflare is OFF (gray cloud / DNS-only), serve HTTPS with your own
# certs or proxy_pass to the docker HTTPS port.
server {
    listen 80;
    listen [::]:80;
    server_name schedule.yourdomain.com ftth.yourdomain.com;

    # Let certbot challenge work on the host too (optional)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Either redirect to HTTPS (if host handles SSL) ...
    location / {
        return 301 https://$host$request_uri;
    }

    # ... OR skip this whole server block and just proxy HTTP directly
    # if Cloudflare handles SSL (Flexible mode):
    # location / {
    #     proxy_pass http://127.0.0.1:8080;
    #     proxy_set_header Host $host;
    #     ...
    # }
}

# ── HTTPS (only needed if host terminates SSL instead of Cloudflare) ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name schedule.yourdomain.com;

    # Your own certs (host-managed) OR from docker volume
    ssl_certificate     /etc/letsencrypt/live/schedule.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/schedule.yourdomain.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        # Proxy to docker nginx (HTTP is fine, it's localhost)
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }
}

