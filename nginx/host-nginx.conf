# ── Host Nginx — terminates SSL, proxies HTTP to docker nginx ────────
# Install: symlink into /etc/nginx/sites-enabled/ and reload.

server {
    listen 80;
    listen [::]:80;
    server_name schedule.stationhotspot.net.id;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name schedule.stationhotspot.net.id;

    # SSL certs — managed on the host via certbot
    ssl_certificate     /etc/letsencrypt/live/schedule.stationhotspot.net.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/schedule.stationhotspot.net.id/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Proxy to docker nginx (HTTP — localhost, no SSL needed)
    location / {
        proxy_pass http://127.0.0.1:9080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }
}

