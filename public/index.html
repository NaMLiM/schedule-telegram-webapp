<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="color-scheme" content="light dark">
  <title>Team Schedule</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div id="app">
    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="spinner"></div>
      <p>Loading…</p>
    </div>

    <!-- Access Denied -->
    <div id="access-denied" style="display:none">
      <div class="denied-card">
        <div class="denied-icon">🚫</div>
        <h2>Access Denied</h2>
        <p>You are not registered as an employee.</p>
        <p class="hint">Please contact your administrator.</p>
      </div>
    </div>

    <!-- Main App -->
    <div id="main-app" style="display:none">
      <!-- Header -->
      <header id="app-header">
        <div class="header-left">
          <h1 id="team-name">Team Schedule</h1>
          <span id="admin-badge" class="badge badge-admin" style="display:none">Admin</span>
        </div>
        <div class="header-right">
          <button id="sync-btn" class="btn-icon" title="Sync employees" style="display:none">🔄</button>
          <select id="team-switcher" class="team-switcher" style="display:none"></select>
        </div>
      </header>

      <!-- Tab Bar -->
      <nav class="tab-bar">
        <button class="tab-btn active" data-tab="calendar">📅 Calendar</button>
        <button class="tab-btn" data-tab="list">📋 List</button>
      </nav>

      <!-- Calendar View -->
      <div id="view-calendar" class="view">
        <div class="calendar-nav">
          <button id="cal-prev" class="cal-nav-btn">◀</button>
          <span id="cal-label" class="cal-label">June 2026</span>
          <button id="cal-next" class="cal-nav-btn">▶</button>
        </div>
        <div class="calendar-grid" id="calendar-grid">
          <!-- Generated by JS -->
        </div>
      </div>

      <!-- List View -->
      <div id="view-list" class="view" style="display:none">
        <div id="list-events">
          <!-- Generated by JS -->
        </div>
      </div>

      <!-- Add Event -->
      <div class="add-event-bar">
        <input type="text" id="event-input" placeholder="e.g. June 5: Meeting with Alex" class="event-input">
        <button id="add-event-btn" class="btn btn-primary" title="Add Event">+</button>
      </div>
      <div id="event-preview" class="event-preview" style="display:none"></div>

      <!-- Employee Picker Modal -->
      <div id="picker-modal" class="modal-overlay" style="display:none">
        <div class="modal-card">
          <h3>Select Employees</h3>
          <div id="picker-list" class="picker-list"></div>
          <div class="modal-actions">
            <button id="picker-cancel" class="btn btn-secondary">Cancel</button>
            <button id="picker-confirm" class="btn btn-primary">Confirm</button>
          </div>
        </div>
      </div>

      <!-- Event Detail Modal -->
      <div id="detail-modal" class="modal-overlay" style="display:none">
        <div class="modal-card">
          <h3 id="detail-date"></h3>
          <div id="detail-events"></div>
          <div class="modal-actions">
            <button id="detail-close" class="btn btn-secondary">Close</button>
          </div>
        </div>
      </div>

      <!-- Toast -->
      <div id="toast" class="toast" style="display:none"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
